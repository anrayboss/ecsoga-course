    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      background: #0a0e1a;
      color: #e0e6f0;
      min-height: 100vh;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(10, 14, 26, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 180, 255, 0.15);
      display: flex;
      align-items: center;
      padding: 0 2rem;
      height: 56px;
      gap: 1.5rem;
    }

    .nav-logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: #00b4ff;
      letter-spacing: .05em;
      margin-right: auto;
    }

    .nav-btn {
      background: none;
      border: 1px solid rgba(0, 180, 255, 0.35);
      color: #a0c8e8;
      padding: .35rem .9rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: .85rem;
      transition: all .2s;
    }

    .nav-btn:hover,
    .nav-btn.active {
      background: rgba(0, 180, 255, 0.15);
      color: #00d4ff;
      border-color: #00b4ff;
    }

    /* ─── PAGES ─── */
    .page {
      display: none;
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
    }

    .page.active {
      display: flex;
      flex-direction: column;
    }

    /* ─── ROADMAP PAGE ─── */
    #page-roadmap {
      background: radial-gradient(ellipse at 20% 30%, #0d1f3c 0%, #0a0e1a 60%);
    }

    #page-roadmap svg {
      width: 100%;
      height: 100%;
    }

    .module-node circle {
      cursor: pointer;
      transition: r .2s, filter .2s;
    }

    .module-node:hover circle {
      filter: brightness(1.3);
    }

    .lesson-node circle {
      cursor: pointer;
      transition: all .2s;
    }

    .lesson-node:hover circle {
      filter: brightness(1.4);
    }

    .node-label {
      pointer-events: none;
      font-family: 'Microsoft JhengHei', sans-serif;
    }

    .link-line {
      stroke-opacity: 0.45;
    }

    /* ─── MINDMAP PAGES ─── */
    .mindmap-page {
      background: #050810;
    }

    .mindmap-header {
      padding: 1.2rem 2rem;
      border-bottom: 1px solid rgba(0, 180, 255, 0.12);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .mindmap-header h2 {
      font-size: 1.25rem;
      color: #00d4ff;
      flex: 1;
    }

    .back-btn {
      background: rgba(0, 180, 255, 0.1);
      border: 1px solid rgba(0, 180, 255, 0.3);
      color: #80c8e8;
      padding: .4rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: .85rem;
    }

    .back-btn:hover {
      background: rgba(0, 180, 255, 0.2);
      color: #00d4ff;
    }

    .mindmap-svg-wrap {
      flex: 1;
      overflow: hidden;
    }

    .mindmap-svg-wrap svg {
      width: 100%;
      height: 100%;
    }

    /* ─── TOOLTIP ─── */
    .tooltip {
      position: fixed;
      background: rgba(5, 12, 30, 0.95);
      border: 1px solid rgba(0, 180, 255, 0.4);
      border-radius: 8px;
      padding: .7rem 1rem;
      font-size: .82rem;
      color: #c8e0f8;
      max-width: 280px;
      pointer-events: none;
      z-index: 999;
      display: none;
      line-height: 1.6;
    }

    /* ─── MODULE CARDS (fallback overview) ─── */
    .module-status {
      font-size: .7rem;
      padding: .15rem .4rem;
      border-radius: 4px;
      margin-left: .5rem;
    }

    .status-video {
      background: rgba(0, 180, 255, 0.2);
      color: #00b4ff;
    }

    .status-text {
      background: rgba(80, 220, 120, 0.2);
      color: #50dc78;
    }

    .status-maint {
      background: rgba(255, 140, 0, 0.2);
      color: #ffaa40;
    }

    /* ─── RESPONSIVE DESIGN ─── */
    .hamburger-icon {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: .35rem;
    }

    .hamburger-icon span {
      width: 24px;
      height: 2.5px;
      background: #00d4ff;
      border-radius: 2px;
      transition: all .3s;
    }

    #menu-toggle {
      display: none;
    }

    @media (max-width: 768px) {
      /* 平板以下屏幕調整 */

        padding: 0 1rem;
        height: 50px;
        gap: 0.8rem;

      .hamburger-icon {

      }

      .nav-menu {
        position: fixed;
        top: 50px;
        left: 0;
        right: 0;
        background: rgba(10, 14, 26, 0.98);
        border-bottom: 1px solid rgba(0, 180, 255, 0.15);

        padding: 0.5rem 0;
        max-height: 0;
        overflow: hidden;
        transition: max-height .3s ease;

      }

      .nav-btn {
        font-size: .8rem;
        padding: .5rem 1.2rem;
        width: 100%;
        text-align: left;
        border: none;
        background: transparent;
        border-bottom: 1px solid rgba(0, 180, 255, 0.1);

        margin-left: 0 !important;

      #menu-toggle:checked ~ .hamburger-icon span:nth-child(1) {
        transform: rotate(45deg) translate(8px, 8px);
      }

      #menu-toggle:checked ~ .hamburger-icon span:nth-child(2) {
        opacity: 0;
      }

      #menu-toggle:checked ~ .hamburger-icon span:nth-child(3) {
        transform: rotate(-45deg) translate(7px, -7px);
      }
    }

    @media (max-width: 480px) {
      /* 手機屏幕調整 */
      nav {
        padding: 0 0.8rem;
        height: 48px;
      }

      .nav-logo {

        font-size: .75rem;

      }

      .mindmap-header {
        padding: 0.8rem 1rem;
      }

      .mindmap-header h2 {
        font-size: 1rem;
      }
    }

    @media (max-width: 1024px) and (min-width: 769px) {
      /* 大平板調整 */
      nav {
        padding: 0 1.5rem;
      }

        font-size: .8rem;
        padding: .3rem .7rem;
      }
    }
  </style>

    // ════════════════════════════════════════
    //  PAGE SWITCHING
    // ════════════════════════════════════════
    function showPage(id, btn) {
      document.querySelectorAll('.page').forEach(function (p) { p.classList.remove('active'); });
      var targetPage = document.getElementById('page-' + id);
      if (targetPage) targetPage.classList.add('active');

      document.querySelectorAll('.nav-btn').forEach(function (b) { b.classList.remove('active'); });
      if (btn) btn.classList.add('active');

      // 如果切換的是模組頁面，自動構建心智圖
      var mod = courseData.modules.find(m => m.page === id);
      if (mod) {
        buildMindmap(mod);
      }
    }

    // ════════════════════════════════════════
    //  MOBILE MENU CONTROL

    function closeMobileMenu() {
      document.getElementById('menu-toggle').checked = false;
    }

    // ════════════════════════════════════════
    //  TOOLTIP
    // ════════════════════════════════════════
    var tip = document.getElementById('tooltip');
    function showTip(evt, html) {
      tip.innerHTML = html;
      tip.style.display = 'block';
      moveTip(evt);
    }
    function moveTip(evt) {
      var x = evt.pageX + 14, y = evt.pageY - 10;
      if (x + 290 > window.innerWidth) x = evt.pageX - 300;
      tip.style.left = x + 'px'; tip.style.top = y + 'px';
    }
    function hideTip() { tip.style.display = 'none'; }

      var containerEl = document.getElementById('page-roadmap');
      var W = containerEl.offsetWidth;
      var H = containerEl.offsetHeight;
      svg.attr('viewBox', '0 0 ' + W + ' ' + H).selectAll('*').remove();

      // Stars bg (Static background)
      var stars = d3.range(120).map(function () { return { x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.5 + 0.3 }; });
      svg.selectAll('circle.star').data(stars).enter().append('circle').attr('class', 'star')
        .attr('cx', function (d) { return d.x; }).attr('cy', function (d) { return d.y; }).attr('r', function (d) { return d.r; })
        .attr('fill', '#ffffff').attr('opacity', function () { return Math.random() * 0.5 + 0.1; });

      // Main Container for Zoom
      var mainG = svg.append('g').attr('class', 'main-g');
      var zoom = d3.zoom().scaleExtent([0.4, 4]).on('zoom', (e) => mainG.attr('transform', e.transform));
      svg.call(zoom);

      var cx = W / 2, cy = H / 2;

      // Defs (glow filters)
      var defs = svg.append('defs');
      ['blue', 'green', 'red', 'purple'].forEach(function (c) {
        var f = defs.append('filter').attr('id', 'glow-' + c).attr('x', '-50%').attr('y', '-50%').attr('width', '200%').attr('height', '200%');
        f.append('feGaussianBlur').attr('stdDeviation', '4').attr('result', 'coloredBlur');
        var merge = f.append('feMerge');
        merge.append('feMergeNode').attr('in', 'coloredBlur');
        merge.append('feMergeNode').attr('in', 'SourceGraphic');
      });

      // Adaptive Radii Calculation
      var baseDim = Math.min(W, H);
      var totalLessons = courseData.modules.reduce((sum, mod) => sum + mod.lessons.length, 0);
      var angleStep = (2 * Math.PI) / totalLessons;

      // 根據屏幕寬度自適應調整半徑與字體
      var screenSize = W < 480 ? 'mobile' : W < 768 ? 'tablet' : 'desktop';
      var moduleRadius, lessonRadius, centerRadius, moduleTextSize, lessonNumSize, lessonLabelSize;
      
      if (screenSize === 'mobile') {
        moduleRadius = baseDim * 0.08;
        lessonRadius = baseDim * 0.22;
        centerRadius = 35;
        moduleTextSize = '0.6rem';
        lessonNumSize = '0.5rem';
        lessonLabelSize = '0.5rem';
      } else if (screenSize === 'tablet') {
        moduleRadius = baseDim * 0.12;
        lessonRadius = baseDim * 0.30;
        centerRadius = 45;
        moduleTextSize = '0.7rem';
        lessonNumSize = '0.6rem';
        lessonLabelSize = '0.55rem';
      } else {
        moduleRadius = baseDim * 0.16;
        lessonRadius = baseDim * 0.40;
        centerRadius = 55;
        moduleTextSize = '1rem';
        lessonNumSize = '0.65rem';
        lessonLabelSize = '0.6rem';
      }

      // Center Node
      var centerG = mainG.append('g');
      centerG.append('circle').attr('cx', cx).attr('cy', cy).attr('r', centerRadius)
        .attr('fill', '#001428').attr('stroke', '#00b4ff').attr('stroke-width', 2).attr('filter', 'url(#glow-blue)');
      centerG.append('text').attr('x', cx).attr('y', cy - 8).attr('text-anchor', 'middle')
        .attr('fill', '#00d4ff').attr('font-size', moduleTextSize).attr('font-weight', '700').text('電商防護盾');
      centerG.append('text').attr('x', cx).attr('y', cy + 12).attr('text-anchor', 'middle')
        .attr('fill', '#80c0e0').attr('font-size', '.7rem').text('課程 Roadmap');

      var currentLessonIndex = 0;

      courseData.modules.forEach(function (mod, i) {
        var lessonCount = mod.lessons.length;
        var startAngle = currentLessonIndex * angleStep - Math.PI / 2;
        var endAngle = (currentLessonIndex + lessonCount - 1) * angleStep - Math.PI / 2;
        var midAngle = (startAngle + endAngle) / 2;

        var mx = cx + moduleRadius * Math.cos(midAngle);
        var my = cy + moduleRadius * Math.sin(midAngle);

        mainG.append('line').attr('x1', cx).attr('y1', cy).attr('x2', mx).attr('y2', my)
          .attr('stroke', mod.color).attr('stroke-width', 2).attr('stroke-dasharray', '6,4').attr('opacity', .6);

        var moduleNodeRadius = screenSize === 'mobile' ? 25 : screenSize === 'tablet' ? 32 : 40;
        var mg = mainG.append('g').attr('class', 'module-node').attr('cursor', 'pointer')
          .on('click', function () {
            var btnEl = document.querySelector('.nav-btn[onclick*="' + mod.page + '"]');
            showPage(mod.page, btnEl);
            buildMindmap(mod);
          })
          .on('mouseover', function (evt) {
            showTip(evt, '<strong>' + mod.title + '</strong><br>' + mod.subtitle + '<br><em style="color:#60b0d8;font-size:.75rem">點擊進入心智圖 →</em>');
          })
          .on('mousemove', moveTip).on('mouseout', hideTip);

        mg.append('circle').attr('cx', mx).attr('cy', my).attr('r', moduleNodeRadius)
          .attr('fill', mod.dark).attr('stroke', mod.color).attr('stroke-width', 2.5)
          .attr('filter', 'url(#glow-' + (i === 0 ? 'green' : i === 1 ? 'red' : 'purple') + ')');
        mg.append('text').attr('x', mx).attr('y', my - 6).attr('text-anchor', 'middle')
          .attr('fill', mod.color).attr('font-size', moduleTextSize).attr('font-weight', '700').text(mod.title);
        mg.append('text').attr('x', mx).attr('y', my + 10).attr('text-anchor', 'middle')
          .attr('fill', '#a0c8e0').attr('font-size', '.6rem').text(mod.subtitle.substring(0, 10));

        mod.lessons.forEach(function (lesson, j) {
          var angle = (currentLessonIndex * angleStep) - Math.PI / 2;
          var lx = cx + lessonRadius * Math.cos(angle);
          var ly = cy + lessonRadius * Math.sin(angle);

          mainG.append('line').attr('x1', mx).attr('y1', my).attr('x2', lx).attr('y2', ly)
            .attr('stroke', mod.color).attr('stroke-width', 1).attr('opacity', .4);

          var lessonNodeRadius = screenSize === 'mobile' ? 10 : screenSize === 'tablet' ? 14 : 18;
          var nodeColor = mod.color;
          var lg = mainG.append('g').attr('class', 'lesson-node').attr('cursor', 'pointer')
            .on('click', function () {
              var btnEl = document.querySelector('.nav-btn[onclick*="' + mod.page + '"]');
              showPage(mod.page, btnEl);
              buildMindmap(mod, lesson.id);
            })
            .on('mouseover', function (evt) {
              var pts = lesson.points.slice(0, 3).map(function (p) { return '• ' + p; }).join('<br>');
              showTip(evt, '<strong>' + lesson.num + ' ' + lesson.title + '</strong><br>' + pts);
            })
            .on('mousemove', moveTip).on('mouseout', hideTip);

          lg.append('circle').attr('cx', lx).attr('cy', ly).attr('r', lessonNodeRadius)
            .attr('fill', 'rgba(10,14,26,0.9)').attr('stroke', nodeColor).attr('stroke-width', 1.5);
          lg.append('text').attr('x', lx).attr('y', ly - 2).attr('text-anchor', 'middle')
            .attr('fill', nodeColor).attr('font-size', lessonNumSize).attr('font-weight', '700').text(lesson.num);

          // Multi-line Adaptive Label
          var maxChars = screenSize === 'mobile' ? 3 : 5;
          var lineHeight = screenSize === 'mobile' ? 12 : 15;
          var labelRadius = lessonRadius + (screenSize === 'mobile' ? 30 : 60);
          var tx = cx + labelRadius * Math.cos(angle);
          var ty = cy + labelRadius * Math.sin(angle);

          var lines = [];
          for (var k = 0; k < lesson.title.length; k += maxChars) {
            lines.push(lesson.title.substring(k, k + maxChars));
          }

          var textNode = lg.append('text')
            .attr('x', tx).attr('y', ty - (lines.length - 1) * (lineHeight / 2))
            .attr('text-anchor', 'middle').attr('fill', '#a0c0d8').attr('font-size', lessonLabelSize)
            .attr('style', 'pointer-events: none;');

          lines.forEach(function (line, li) {
            textNode.append('tspan').attr('x', tx).attr('dy', li === 0 ? 0 : lineHeight).text(line);
          });

          currentLessonIndex++;
        });
      });

      // Auto-center on load
      svg.call(zoom.transform, d3.zoomIdentity);
    }

    // ════════════════════════════════════════
    //  MINDMAP
    // ════════════════════════════════════════
    var mindmapBuilt = {};

    function buildMindmap(mod, highlightId) {
      var svgId = mod.id + '-svg';
      var container = document.getElementById('page-' + mod.page).querySelector('.mindmap-svg-wrap');
      var W = container.offsetWidth || 900;
      var H = container.offsetHeight || 600;
      var screenSize = W < 480 ? 'mobile' : W < 768 ? 'tablet' : 'desktop';

      if (mindmapBuilt[mod.id]) {
        // Just highlight if needed
        if (highlightId) highlightLesson(mod.id, highlightId);
        return;
      }
      mindmapBuilt[mod.id] = true;

      var svg = d3.select('#' + svgId).attr('viewBox', '0 0 ' + W + ' ' + H);
      var g = svg.append('g');

      // zoom
      svg.call(d3.zoom().scaleExtent([0.4, 3]).on('zoom', function (event) { g.attr('transform', event.transform); }));

      var cx = W / 2, cy = H / 2;
      var numLessons = mod.lessons.length;

      // Stars
      d3.range(80).forEach(function () {
        svg.append('circle').attr('cx', Math.random() * W).attr('cy', Math.random() * H)
          .attr('r', Math.random() * 1.2 + 0.2).attr('fill', '#fff').attr('opacity', Math.random() * 0.3 + 0.05);
      });

      // Center
      g.append('circle').attr('cx', cx).attr('cy', cy).attr('r', 75)
        .attr('fill', mod.dark).attr('stroke', mod.color).attr('stroke-width', 2.5);
      g.append('text').attr('x', cx).attr('y', cy - 8).attr('text-anchor', 'middle')
        .attr('fill', mod.color).attr('font-size', '.9rem').attr('font-weight', '700').text(mod.title);
      g.append('text').attr('x', cx).attr('y', cy + 10).attr('text-anchor', 'middle')
        .attr('fill', '#80b8d0').attr('font-size', '.7rem').text(mod.subtitle.substring(0, 8));

      // Arrange lessons in a circle - adaptive radius
      var radiusMult = screenSize === 'mobile' ? 0.20 : screenSize === 'tablet' ? 0.27 : 0.33;
      var radius = Math.min(W, H) * radiusMult;
      var lessonNodeRadius = screenSize === 'mobile' ? 30 : screenSize === 'tablet' ? 40 : 50;
      var lessonNodeFontSize = screenSize === 'mobile' ? '.6rem' : screenSize === 'tablet' ? '.68rem' : '.75rem';
      var lessonTitleSize = screenSize === 'mobile' ? '.5rem' : screenSize === 'tablet' ? '.56rem' : '.62rem';
      
      mod.lessons.forEach(function (lesson, i) {
        var angle = (i / numLessons) * 2 * Math.PI - Math.PI / 2;
        var lx = cx + radius * Math.cos(angle);
        var ly = cy + radius * Math.sin(angle);
        var nodeColor = lesson.type === 'maint' ? '#ff8c00' : mod.color;

        // Line
        g.append('line').attr('x1', cx).attr('y1', cy).attr('x2', lx).attr('y2', ly)
          .attr('stroke', nodeColor).attr('stroke-width', 1.5).attr('stroke-dasharray', lesson.type === 'maint' ? '4,3' : 'none').attr('opacity', .4);

        var ng = g.append('g').attr('class', 'lesson-mm-node').attr('id', 'mm-' + lesson.id)
          .attr('cursor', 'pointer')
          .on('click', function () { toggleDetails(mod, lesson, lx, ly, g, nodeColor); })
          .on('mouseover', function (evt) {
            var pts = lesson.points.map(function (p) { return '• ' + p; }).join('<br>');
            showTip(evt, '<strong>' + lesson.num + '. ' + lesson.title + '</strong><br>' + pts);
          })
          .on('mousemove', moveTip).on('mouseout', hideTip);

        ng.append('circle').attr('cx', lx).attr('cy', ly).attr('r', lessonNodeRadius)
          .attr('fill', 'rgba(5,10,22,0.9)').attr('stroke', nodeColor).attr('stroke-width', 2)
          .attr('id', 'circle-' + lesson.id);

        // Type icon
        var icon = lesson.type === 'video' ? '▶' : lesson.type === 'maint' ? '🔧' : '📄';
        ng.append('text').attr('x', lx).attr('y', ly - 8).attr('text-anchor', 'middle')
          .attr('font-size', lessonNodeFontSize).attr('fill', nodeColor).text(lesson.num + ' ' + icon);

        // Wrap title - adjust char per line based on screen size
        var charsPerLine = screenSize === 'mobile' ? 4 : 6;
        var words = lesson.title.split('');
        var line1 = words.slice(0, charsPerLine).join('');
        var line2 = words.slice(charsPerLine, charsPerLine * 2).join('');
        ng.append('text').attr('x', lx).attr('y', ly + 6).attr('text-anchor', 'middle')
          .attr('fill', '#d0e8f8').attr('font-size', lessonTitleSize).text(line1);
        if (line2) ng.append('text').attr('x', lx).attr('y', ly + 17).attr('text-anchor', 'middle')
          .attr('fill', '#d0e8f8').attr('font-size', lessonTitleSize).text(line2);
      });

      if (highlightId) highlightLesson(mod.id, highlightId);
    }

    var openDetail = null;

    function toggleDetails(mod, lesson, lx, ly, g, nodeColor) {
      // Remove existing detail
      g.selectAll('.detail-group').remove();
      if (openDetail === lesson.id) { openDetail = null; return; }
      openDetail = lesson.id;

      var screenSize = document.querySelector('.mindmap-svg-wrap').offsetWidth < 480 ? 'mobile' : 
                       document.querySelector('.mindmap-svg-wrap').offsetWidth < 768 ? 'tablet' : 'desktop';
      var bw = screenSize === 'mobile' ? 140 : screenSize === 'tablet' ? 180 : 220;
      var bh = lesson.points.length * (screenSize === 'mobile' ? 18 : 22) + 40;
      var bx = lx + (screenSize === 'mobile' ? 20 : 35);
      var by = ly - bh / 2;
      var fontSize = screenSize === 'mobile' ? '.6rem' : screenSize === 'tablet' ? '.7rem' : '.8rem';
      var pointSize = screenSize === 'mobile' ? '.55rem' : screenSize === 'tablet' ? '.62rem' : '.68rem';
      var linkSize = screenSize === 'mobile' ? '.5rem' : screenSize === 'tablet' ? '.6rem' : '.65rem';

      var dg = g.append('g').attr('class', 'detail-group');
      dg.append('rect').attr('x', bx).attr('y', by).attr('width', bw).attr('height', bh)
        .attr('rx', 8).attr('fill', 'rgba(5,10,30,0.95)').attr('stroke', nodeColor).attr('stroke-width', 1.5);
      dg.append('text').attr('x', bx + 8).attr('y', by + 16)
        .attr('fill', nodeColor).attr('font-size', fontSize).attr('font-weight', '700')
        .text(lesson.num + ' ' + lesson.title.substring(0, screenSize === 'mobile' ? 10 : 14));

      lesson.points.forEach(function (pt, pi) {
        dg.append('text').attr('x', bx + 8).attr('y', by + 32 + pi * (screenSize === 'mobile' ? 18 : 22))
          .attr('fill', '#c0daf0').attr('font-size', pointSize).text('• ' + pt.substring(0, screenSize === 'mobile' ? 14 : 22));
      });

      if (lesson.url) {
        dg.append('text').attr('x', bx + 8).attr('y', by + bh - 6)
          .attr('fill', '#40b8ff').attr('font-size', linkSize).attr('cursor', 'pointer')
          .text('→ 前往課程')
          .on('click', function () { window.open(lesson.url, '_blank'); });
      }
    }

    function highlightLesson(modId, lessonId) {
      d3.select('#circle-' + lessonId).attr('stroke', '#ffff00').attr('stroke-width', 4);
    }

    // ════════════════════════════════════════
    //  DOWNLOAD
    // ════════════════════════════════════════
    function downloadHTML() {
      var html = document.documentElement.outerHTML;
      var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'ecsoga-roadmap.html';
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // ════════════════════════════════════════
    //  INIT
    // ════════════════════════════════════════
    window.addEventListener('load', function () {
      buildRoadmap();
    });
    window.addEventListener('resize', function () {
      d3.select('#roadmap-svg').selectAll('*').remove();
      buildRoadmap();
    });
  </script>
</body>
